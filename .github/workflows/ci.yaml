name: Build & Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg
          bash scripts/setup-ffmpeg.sh

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg -y
          $target = rustc -vV | Select-String "host:" | ForEach-Object { $_.ToString().Split(" ")[1] }
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          Copy-Item (Get-Command ffmpeg).Source "src-tauri/binaries/ffmpeg-$target.exe"
          Copy-Item (Get-Command ffprobe).Source "src-tauri/binaries/ffprobe-$target.exe"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "JumpCutter v__VERSION__"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
